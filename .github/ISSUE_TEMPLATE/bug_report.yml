name: Bug report
description: Report something that is broken in the calculator or its build
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we see this ourselves? Include inputs (vial mg, diluent ml, dose) if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, or "npm run build" / "npm run dev" if it is a build issue.
    validations:
      required: false
